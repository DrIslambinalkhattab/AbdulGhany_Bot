# .github/workflows/listener.yml
name: Bot Listener

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # كل ساعة يعيد التشغيل

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python listener.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      - name: 💾 حفظ الـ offset
        if: always()
        run: |
          git config user.name  "AbdulGhanyBot"
          git config user.email "abdulghanybot@github.com"
          git add listener_offset.json
          git diff --staged --quiet || git commit -m "📡 تحديث offset المستمع"
          git push
