# .github/workflows/listener.yml
name: Bot Listener

on:
  workflow_dispatch:
  # مرة يوميًا (ملاحظة: Cron في GitHub Actions بتوقيت UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run listener (batch)
        run: python listener.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          # اختياري: لو تحب تغيّر الرابط بدون تعديل الكود
          # SHEETS_URL: ${{ secrets.SHEETS_URL }}
          MAX_RUNTIME_SEC: '180'

      - name: 💾 حفظ الـ offset
        if: always()
        run: |
          git config user.name  "AbdulGhanyBot"
          git config user.email "abdulghanybot@github.com"
          git add listener_offset.json
          git diff --staged --quiet || git commit -m "📡 تحديث offset المستمع"
          git push
