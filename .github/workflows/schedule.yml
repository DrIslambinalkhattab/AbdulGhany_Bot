name: AbdulGhanyBot 🤖

on:
  schedule:
    - cron: '37 2 * * *'   # 📖 PDF + MP3       — 5:37 ص القاهرة
    - cron: '7 3 * * *'    # 🌅 أذكار الصباح    — 6:07 ص القاهرة
    - cron: '37 13 * * *'  # 🌆 أذكار المساء    — 4:37 م القاهرة
    - cron: '37 7 * * 5'   # 📖 سورة الكهف      — جمعة 10:37 ص
    - cron: '7 7 * * *'    # ☀️ تذكير الضحى     — 10:07 ص القاهرة
    - cron: '7 11 * * *'   # 🌤 تذكير الظهر     — 2:07 م القاهرة
    - cron: '7 18 * * *'   # 🌙 تذكير الليل     — 9:07 م القاهرة
    - cron: '7 5 * * 5'    # 💛 صلاة على النبي  — جمعة 8:07 ص
    - cron: '7 7 * * 5'    # 💛 صلاة على النبي  — جمعة 10:07 ص
    - cron: '7 9 * * 5'    # 💛 صلاة على النبي  — جمعة 12:07 م
    - cron: '7 13 * * 5'   # 💛 صلاة على النبي  — جمعة 4:07 م
    - cron: '7 17 * * 0'   # 🌙 تذكير الاثنين   — الأحد 8:07 م
    - cron: '7 17 * * 3'   # 🌙 تذكير الخميس    — الأربعاء 8:07 م
    # 📿 ذكر الساعة — 14 ذكر
    - cron: '13 4 * * *'   # 📿 ذكر الساعة — 7:13 ص
    - cron: '13 5 * * *'   # 📿 ذكر الساعة — 8:13 ص
    - cron: '13 6 * * *'   # 📿 ذكر الساعة — 9:13 ص
    - cron: '13 8 * * *'   # 📿 ذكر الساعة — 11:13 ص
    - cron: '13 9 * * *'   # 📿 ذكر الساعة — 12:13 م
    - cron: '13 10 * * *'  # 📿 ذكر الساعة — 1:13 م
    - cron: '13 12 * * *'  # 📿 ذكر الساعة — 3:13 م
    - cron: '13 13 * * *'  # 📿 ذكر الساعة — 4:13 م
    - cron: '13 14 * * *'  # 📿 ذكر الساعة — 5:13 م
    - cron: '13 15 * * *'  # 📿 ذكر الساعة — 6:13 م
    - cron: '13 16 * * *'  # 📿 ذكر الساعة — 7:13 م
    - cron: '13 17 * * *'  # 📿 ذكر الساعة — 8:13 م
    - cron: '13 19 * * *'  # 📿 ذكر الساعة — 10:13 م
    - cron: '13 20 * * *'  # 📿 ذكر الساعة — 11:13 م
  workflow_dispatch:
    inputs:
      task:
        description: 'المهمة المطلوبة'
        required: true
        default: 'daily_files'
        type: choice
        options:
          - daily_files
          - sabah
          - masa
          - kahf
          - remind_morning
          - remind_midday
          - remind_night
          - friday_salah
          - hourly_zikr
          - fasting_monday
          - fasting_thursday

jobs:

  daily-files:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'daily_files') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 2 * * *')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          TOPIC_ID:         ${{ secrets.TOPIC_ID }}
          RELEASE_BASE:     ${{ secrets.RELEASE_BASE }}
          RELEASE_BASE_MP3: ${{ secrets.RELEASE_BASE_MP3 }}
        run: python bot.py daily_files
      - name: 💾 Save progress
        run: |
          git config user.name  "AbdulGhanyBot"
          git config user.email "abdulghanybot@github.com"
          git add state.json
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "📊 تحديث التقدم: $(cat state.json)"
          git push

  sabah:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sabah') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          TOPIC_ID:     ${{ secrets.TOPIC_ID }}
        run: python bot.py sabah

  masa:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'masa') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 13 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          TOPIC_ID:     ${{ secrets.TOPIC_ID }}
        run: python bot.py masa

  kahf:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'kahf') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 7 * * 5')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          TOPIC_ID:     ${{ secrets.TOPIC_ID }}
          RELEASE_KAHF: ${{ secrets.RELEASE_KAHF }}
        run: python bot.py kahf

  remind-morning:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'remind_morning') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python bot.py remind_morning

  remind-midday:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'remind_midday') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python bot.py remind_midday

  remind-night:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'remind_night') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 18 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python bot.py remind_night

  friday-salah:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'friday_salah') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 5 * * 5' ||
        github.event.schedule == '0 7 * * 5' ||
        github.event.schedule == '0 9 * * 5' ||
        github.event.schedule == '0 13 * * 5'
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: |
          SCHED="${{ github.event.schedule }}"
          if   [ "$SCHED" = "0 5 * * 5" ];  then python bot.py friday_salah_fajr
          elif [ "$SCHED" = "0 7 * * 5" ];  then python bot.py friday_salah_morning
          elif [ "$SCHED" = "0 9 * * 5" ];  then python bot.py friday_salah_midday
          elif [ "$SCHED" = "0 13 * * 5" ]; then python bot.py friday_salah_asr
          else                                   python bot.py friday_salah
          fi

  hourly-zikr:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'hourly_zikr') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '13 4 * * *' ||
        github.event.schedule == '13 5 * * *' ||
        github.event.schedule == '13 6 * * *' ||
        github.event.schedule == '13 8 * * *' ||
        github.event.schedule == '13 9 * * *' ||
        github.event.schedule == '13 10 * * *' ||
        github.event.schedule == '13 12 * * *' ||
        github.event.schedule == '13 13 * * *' ||
        github.event.schedule == '13 14 * * *' ||
        github.event.schedule == '13 15 * * *' ||
        github.event.schedule == '13 16 * * *' ||
        github.event.schedule == '13 17 * * *' ||
        github.event.schedule == '13 19 * * *' ||
        github.event.schedule == '13 20 * * *'
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python bot.py hourly_zikr
      - name: 💾 Save progress
        run: |
          git config user.name  "AbdulGhanyBot"
          git config user.email "abdulghanybot@github.com"
          git add state.json
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "📿 تحديث الذكر: $(cat state.json)"
          git push

  fasting-monday:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'fasting_monday') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 17 * * 0')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python weekly_content.py fasting_monday

  fasting-thursday:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'fasting_thursday') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 17 * * 3')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 🤖 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          TOPIC_ID:  ${{ secrets.TOPIC_ID }}
        run: python weekly_content.py fasting_thursday
