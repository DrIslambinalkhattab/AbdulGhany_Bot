name: AbdulGhanyBot 🤖

on:
  schedule:
    # 🕐 يعمل يومياً الساعة 3:00م بتوقيت القاهرة (12:00 UTC)
    # يجدول كل مهام الغد دفعةً واحدة في تيليجرام
    - cron: '0 12 * * *'

  workflow_dispatch:
    inputs:
      force:
        description: 'تجاهل Idempotency وإعادة الجدولة (للطوارئ فقط)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:

  dispatcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # في حالة force=true، نعيد تعيين last_scheduled_day لتخطي Idempotency
      - name: 🔄 Force-reset idempotency (طوارئ فقط)
        if: github.event.inputs.force == 'true'
        run: |
          python - <<'EOF'
          import json
          with open("zikr.json", "r") as f:
              s = json.load(f)
          s["last_scheduled_day"] = ""
          with open("zikr.json", "w") as f:
              json.dump(s, f, ensure_ascii=False, indent=2)
          print("⚠️ تم إعادة تعيين last_scheduled_day")
          EOF

      - name: 🤖 Run Dispatcher
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          TOPIC_ID:         ${{ secrets.TOPIC_ID }}
          RELEASE_BASE:     ${{ secrets.RELEASE_BASE }}
          RELEASE_BASE_MP3: ${{ secrets.RELEASE_BASE_MP3 }}
          RELEASE_KAHF:     ${{ secrets.RELEASE_KAHF }}
        run: python dispatcher.py

      - name: 💾 Save state (state.json + zikr.json)
        run: |
          git config user.name  "AbdulGhanyBot"
          git config user.email "abdulghanybot@github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add state.json zikr.json
          git diff --staged --quiet || git commit -m "📊 جدولة يوم $(python -c \"from datetime import datetime,timedelta; import pytz; print((datetime.now(pytz.timezone('Africa/Cairo'))+timedelta(days=1)).strftime('%Y-%m-%d'))\")"
          git push
